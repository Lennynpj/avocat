# Reverse proxy Nginx → app Next.js (écoute sur le port 3000).
# Installation :
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/cabinet
#   sudo ln -s /etc/nginx/sites-available/cabinet /etc/nginx/sites-enabled/cabinet
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# certbot ajoutera ensuite automatiquement le bloc HTTPS (port 443) + la redirection.

server {
    listen 80;
    listen [::]:80;

    server_name slidecraft.fr www.slidecraft.fr;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
